name: PanicLog
options:
  bundleIdPrefix: com.shimondeitel.paniclog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  PanicLog:
    type: application
    platform: iOS
    sources:
      - path: PanicLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.paniclog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: PanicLog/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PanicLogTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PanicLogTests
      - path: PanicLog.storekit
    dependencies:
      - target: PanicLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.paniclog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PanicLogUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PanicLogUITests
    dependencies:
      - target: PanicLog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.paniclog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  PanicLog:
    build:
      targets:
        PanicLog: all
        PanicLogTests: [test]
        PanicLogUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: PanicLog.storekit
    test:
      config: Debug
      storeKitConfiguration: PanicLog.storekit
      targets:
        - PanicLogTests
        - PanicLogUITests
    archive:
      config: Release
